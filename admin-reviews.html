<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Шабашка — Отзывы</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --orange: #E8510A; --orange-light: #FFF0E8; --orange-dark: #B33D06;
  --dark: #14151A; --gray: #6B6B67; --gray-light: #F4F3EF; --border: #E5E4E0;
  --white: #FFFFFF; --green: #1A7A4A; --green-bg: #E8F5EE;
  --amber: #854F0B; --amber-bg: #FAEEDA; --red: #B91C1C; --red-bg: #FEE2E2;
}
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; color: var(--dark); }

.review-card { background: var(--white); border: 1px solid var(--border); border-radius: 12px; padding: 18px; margin-bottom: 12px; display: flex; gap: 16px; }
.review-card.hidden-flag { opacity: 0.55; }
.review-photo { width: 90px; height: 90px; border-radius: 10px; object-fit: cover; flex-shrink: 0; }
.review-photo-placeholder { width: 90px; height: 90px; border-radius: 10px; background: var(--gray-light); flex-shrink: 0; display: flex; align-items: center; justify-content: center; color: var(--gray); font-size: 22px; }
.review-body { flex: 1; }
.review-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 6px; }
.review-job { font-weight: 700; font-size: 13.5px; }
.review-stars { font-size: 13px; }
.review-text { font-size: 13px; color: var(--dark); line-height: 1.5; margin-bottom: 8px; }
.review-meta { font-size: 11.5px; color: var(--gray); }
.review-flag-pill { font-size: 10.5px; padding: 2px 8px; border-radius: 10px; margin-left: 8px; }
.flag-hidden { background: var(--amber-bg); color: var(--amber); }
.flag-deleted { background: var(--red-bg); color: var(--red); }
.review-actions { display: flex; gap: 6px; margin-top: 10px; }
.btn-sm { padding: 6px 12px; border-radius: 7px; font-size: 11.5px; font-weight: 600; border: none; cursor: pointer; font-family: inherit; }
.btn-sm-amber { background: var(--amber-bg); color: var(--amber); }
.btn-sm-red { background: var(--red-bg); color: var(--red); }
.btn-sm-green { background: var(--green-bg); color: var(--green); }
.btn-sm:disabled { opacity: 0.4; cursor: not-allowed; }
.empty-state { padding: 60px 20px; text-align: center; color: var(--gray); }
</style>
<script src="/data.js"></script>
<script src="/admin-data.js"></script>
<script src="/admin-nav.js"></script>
</head>
<body>
<script>
const rendered = ShabashkaAdminNav.renderAdminShell('reviews', 'Отзывы');

if (rendered) {
  const A = ShabashkaAdmin;

  document.getElementById('admContentRoot').innerHTML = `<div id="reviewsList"></div>`;

  function render() {
    const reviews = A.getReviewsWithFlags();
    const canHide = A.canDo('review.hide');
    const canDelete = A.canDo('review.delete');

    if (!reviews.length) {
      document.getElementById('reviewsList').innerHTML = '<div class="empty-state">Отзывов пока нет — они появляются после завершения заказов</div>';
      return;
    }

    document.getElementById('reviewsList').innerHTML = reviews.map(r => {
      const flagged = r.adminStatus !== 'visible';
      const flagPill = r.adminStatus === 'hidden' ? '<span class="review-flag-pill flag-hidden">Скрыт</span>'
        : r.adminStatus === 'deleted' ? '<span class="review-flag-pill flag-deleted">Удалён</span>' : '';

      return `
      <div class="review-card ${flagged ? 'hidden-flag' : ''}">
        ${r.photo ? `<img class="review-photo" src="${r.photo}">` : '<div class="review-photo-placeholder">📷</div>'}
        <div class="review-body">
          <div class="review-top">
            <div class="review-job">${r.jobTitle || 'Заказ #' + r.jobId}${flagPill}</div>
            <div class="review-stars">${'⭐'.repeat(r.rating)}${'☆'.repeat(5-r.rating)}</div>
          </div>
          <div class="review-text">«${r.text}»</div>
          <div class="review-meta">${r.date} · Заказ #${r.jobId}</div>
          <div class="review-actions">
            ${r.adminStatus === 'visible'
              ? `<button class="btn-sm btn-sm-amber" ${canHide?'':'disabled'} onclick="hide(${r.jobId})">Скрыть</button>
                 <button class="btn-sm btn-sm-red" ${canDelete?'':'disabled'} onclick="del(${r.jobId})">Удалить</button>`
              : `<button class="btn-sm btn-sm-green" ${canHide?'':'disabled'} onclick="restore(${r.jobId})">Восстановить</button>`}
          </div>
        </div>
      </div>`;
    }).join('');
  }

  window.hide = function (jobId) { A.hideReview(jobId); render(); };
  window.del = function (jobId) {
    if (!confirm('Удалить отзыв? Действие можно отменить восстановлением.')) return;
    A.deleteReviewFlag(jobId);
    render();
  };
  window.restore = function (jobId) { A.restoreReview(jobId); render(); };

  render();
}
</script>
</body>
</html>
