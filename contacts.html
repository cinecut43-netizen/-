<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="light only">
<style>:root{color-scheme:light only}</style>
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/bold/style.css">
<link rel="stylesheet" href="/mobile.css">
<title>Контакты — Шабашка</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--orange:#E8510A;--dark:#14151A;--gray:#6B6B67;--light:#F4F3EF;--border:#E2E1DB}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--light);color:var(--dark);padding-bottom:80px}
.header{background:#fff;border-bottom:1px solid var(--border);padding:14px 16px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100}
.back-btn{width:36px;height:36px;border-radius:50%;background:var(--light);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center}
.page-title{font-size:18px;font-weight:800}
.content{padding:20px 16px;max-width:600px;margin:0 auto}
.card{background:#fff;border-radius:16px;padding:20px;margin-bottom:12px;border:1px solid var(--border)}
.card-title{font-size:16px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.contact-item{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)}
.contact-item:last-child{border-bottom:none}
.contact-icon{width:40px;height:40px;border-radius:12px;background:#FFF0E8;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.contact-label{font-size:12px;color:var(--gray);margin-bottom:2px}
.contact-value{font-size:15px;font-weight:600;color:var(--dark);text-decoration:none}
.contact-value:hover{color:var(--orange)}
</style>
</head>
<body>
<script src="/data.js"></script>
<script src="/nav2.js"></script>

<div class="header">
  <button class="back-btn" onclick="history.back()">
    <i class="ph-bold ph-arrow-left" style="font-size:16px"></i>
  </button>
  <div class="page-title">Контакты</div>
</div>

<div id="shabashka-nav"></div>

<div class="content">
  <div class="card">
    <div class="card-title">📬 Связаться с нами</div>
    <div class="contact-item">
      <div class="contact-icon"><i class="ph-bold ph-envelope" style="font-size:20px;color:#E8510A"></i></div>
      <div>
        <div class="contact-label">Email поддержки</div>
        <a href="mailto:shabashka.help@gmail.com" class="contact-value">shabashka.help@gmail.com</a>
      </div>
    </div>
    <div class="contact-item">
      <div class="contact-icon"><i class="ph-bold ph-telegram-logo" style="font-size:20px;color:#E8510A"></i></div>
      <div>
        <div class="contact-label">Telegram поддержка</div>
        <a href="https://t.me/shabashka_support_bot" class="contact-value">@shabashka_support_bot</a>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">⏰ Время работы</div>
    <div class="contact-item">
      <div class="contact-icon"><i class="ph-bold ph-clock" style="font-size:20px;color:#E8510A"></i></div>
      <div>
        <div class="contact-label">Поддержка</div>
        <div class="contact-value">Пн-Вс 9:00 - 21:00</div>
      </div>
    </div>
    <div class="contact-item">
      <div class="contact-icon"><i class="ph-bold ph-chat-circle-dots" style="font-size:20px;color:#E8510A"></i></div>
      <div>
        <div class="contact-label">Время ответа</div>
        <div class="contact-value">До 24 часов</div>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">📋 Юридическая информация</div>
    <div class="contact-item">
      <div class="contact-icon"><i class="ph-bold ph-user" style="font-size:20px;color:#E8510A"></i></div>
      <div>
        <div class="contact-label">Оператор ПДн</div>
        <div class="contact-value">Самозанятый</div>
      </div>
    </div>
    <div class="contact-item">
      <div class="contact-icon"><i class="ph-bold ph-envelope" style="font-size:20px;color:#E8510A"></i></div>
      <div>
        <div class="contact-label">Email для правовых вопросов</div>
        <a href="mailto:shabashka.help@gmail.com" class="contact-value">shabashka.help@gmail.com</a>
      </div>
    </div>
  </div>
</div>

<script>
Shabashka.renderNav('contacts');
</script>
</body>
</html>
