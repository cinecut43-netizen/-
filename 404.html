<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Страница не найдена — Шабашка</title>
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/bold/style.css">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --orange: #E8510A; --dark: #0F1014; --gray: #6B6B67;
  --border: #E5E4E0; --white: #fff;
}
html, body { height: 100%; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--dark);
  color: var(--white);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 24px;
  text-align: center;
}

/* Фоновый свет */
body::before {
  content: '';
  position: fixed;
  top: -200px; left: 50%; transform: translateX(-50%);
  width: 600px; height: 600px;
  background: radial-gradient(circle, rgba(232,81,10,0.12) 0%, transparent 70%);
  pointer-events: none;
}

.code {
  font-size: clamp(100px, 20vw, 180px);
  font-weight: 900;
  letter-spacing: -6px;
  line-height: 1;
  margin-bottom: 16px;
  color: var(--white);
  opacity: 0.08;
  user-select: none;
}

.icon-wrap {
  font-size: 56px;
  margin-bottom: 20px;
  position: relative;
  z-index: 1;
  margin-top: -80px;
}

.title {
  font-size: clamp(22px, 4vw, 32px);
  font-weight: 800;
  letter-spacing: -0.5px;
  margin-bottom: 10px;
}

.desc {
  font-size: 15px;
  color: rgba(255,255,255,0.5);
  max-width: 360px;
  line-height: 1.6;
  margin-bottom: 36px;
}

.actions { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }

.btn {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 13px 24px; border-radius: 12px;
  font-size: 14px; font-weight: 700; text-decoration: none;
  font-family: inherit; border: none; cursor: pointer;
  transition: all 0.15s;
}
.btn-primary { background: var(--orange); color: var(--white); }
.btn-primary:hover { background: #B33D06; transform: translateY(-1px); }
.btn-ghost {
  background: rgba(255,255,255,0.07);
  color: rgba(255,255,255,0.8);
  border: 1px solid rgba(255,255,255,0.1);
}
.btn-ghost:hover { background: rgba(255,255,255,0.12); }
.btn i { font-size: 18px; }

/* Быстрые ссылки */
.quick-links {
  margin-top: 48px;
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  justify-content: center;
}
.quick-link {
  display: flex; align-items: center; gap: 6px;
  padding: 8px 14px; border-radius: 10px;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.08);
  color: rgba(255,255,255,0.5);
  font-size: 13px; text-decoration: none;
  transition: all 0.12s;
}
.quick-link:hover { background: rgba(255,255,255,0.09); color: rgba(255,255,255,0.8); }
.quick-link i { font-size: 15px; }

@media (max-width: 480px) {
  .actions { flex-direction: column; align-items: stretch; }
  .btn { justify-content: center; }
}
</style>
<link rel="stylesheet" href="/mobile.css">
</head>
<body>
<div class="code">404</div>
<div class="icon-wrap"><i class="ph-bold ph-map-trifold" style="color:#E8510A"></i></div>
<h1 class="title">Страница не найдена</h1>
<p class="desc">Похоже, эта страница исчезла как срочный заказ без исполнителя. Возможно, адрес устарел или был введён с ошибкой.</p>
<div class="actions">
  <a class="btn btn-primary" href="/"><i class="ph-bold ph-house"></i> На главную</a>
  <a class="btn btn-ghost" href="javascript:history.back()"><i class="ph-bold ph-arrow-left"></i> Назад</a>
</div>
<div class="quick-links">
  <a class="quick-link" href="/"><i class="ph-bold ph-magnifying-glass"></i> Найти работу</a>
  <a class="quick-link" href="/map"><i class="ph-bold ph-map-pin"></i> Карта</a>
  <a class="quick-link" href="/register"><i class="ph-bold ph-user-circle-plus"></i> Регистрация</a>
  <a class="quick-link" href="/landing"><i class="ph-bold ph-info"></i> О сервисе</a>
</div>
</body>
</html>
