<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<title>Статистика — Админка Шабашки</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#F4F3EF;color:#14151A;min-height:100vh}
.header{background:#fff;border-bottom:1px solid #E2E1DB;padding:16px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.header-title{font-size:20px;font-weight:800}
.back{padding:8px 16px;background:#F4F3EF;border:1px solid #E2E1DB;border-radius:10px;text-decoration:none;font-size:14px;color:#14151A;font-weight:600}
.page{padding:24px;max-width:1200px;margin:0 auto}

/* ПЕРИОД */
.period-tabs{display:flex;gap:8px;margin-bottom:24px;background:#fff;border-radius:14px;padding:6px;width:fit-content}
.period-btn{padding:8px 20px;border-radius:10px;border:none;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;color:#6B6B67;background:none}
.period-btn.active{background:#E8510A;color:#fff}

/* КАРТОЧКИ КПИ */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
.kpi{background:#fff;border-radius:16px;padding:20px}
.kpi-label{font-size:12px;color:#9A9A96;font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.kpi-val{font-size:32px;font-weight:900;letter-spacing:-1px;margin-bottom:4px}
.kpi-change{font-size:13px;font-weight:600}
.kpi-change.up{color:#1A7A4A}
.kpi-change.down{color:#B91C1C}
.kpi-change.neutral{color:#9A9A96}

/* ГРАФИКИ */
.charts-row{display:grid;grid-template-columns:2fr 1fr;gap:16px;margin-bottom:24px}
.chart-card{background:#fff;border-radius:16px;padding:20px}
.chart-title{font-size:16px;font-weight:700;margin-bottom:4px}
.chart-sub{font-size:12px;color:#9A9A96;margin-bottom:20px}
.chart-area{position:relative}
canvas{width:100%!important}

/* ТАБЛИЦЫ */
.tables-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px}
.table-card{background:#fff;border-radius:16px;padding:20px}
.table-title{font-size:16px;font-weight:700;margin-bottom:16px}
table{width:100%;border-collapse:collapse}
th{font-size:11px;font-weight:700;color:#9A9A96;text-transform:uppercase;letter-spacing:.5px;padding:8px 0;text-align:left;border-bottom:1px solid #F4F3EF}
td{padding:12px 0;font-size:14px;border-bottom:1px solid #F4F3EF}
td:last-child{text-align:right;font-weight:700}
tr:last-child td{border-bottom:none}

/* ВОРОНКА */
.funnel{background:#fff;border-radius:16px;padding:20px;margin-bottom:24px}
.funnel-title{font-size:16px;font-weight:700;margin-bottom:20px}
.funnel-row{margin-bottom:12px}
.funnel-label{display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px}
.funnel-bar{height:10px;background:#F4F3EF;border-radius:5px;overflow:hidden}
.funnel-fill{height:100%;border-radius:5px;background:#E8510A;transition:width .5s ease}

/* ЖИВАЯ ЛЕНТА */
.feed{background:#fff;border-radius:16px;padding:20px}
.feed-title{font-size:16px;font-weight:700;margin-bottom:16px}
.feed-item{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid #F4F3EF}
.feed-item:last-child{border-bottom:none}
.feed-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.feed-text{font-size:13px;flex:1}
.feed-time{font-size:11px;color:#9A9A96}

@media(max-width:768px){
  .kpi-grid{grid-template-columns:repeat(2,1fr)}
  .charts-row,.tables-row{grid-template-columns:1fr}
}
</style>
</head>
<body>
<script src="/admin-auth.js"></script>
<script src="/data.js"></script>

<div class="header">
  <div>
    <div class="header-title">📊 Статистика</div>
    <div style="font-size:12px;color:#9A9A96;margin-top:2px">Обновлено только что</div>
  </div>
  <div style="display:flex;gap:8px">
    <button onclick="exportCSV()" style="padding:8px 16px;background:#F4F3EF;border:1px solid #E2E1DB;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit">📥 Экспорт</button>
    <a href="/admin" class="back">← Админка</a>
  </div>
</div>

<div class="page">

  <!-- ПЕРИОД -->
  <div class="period-tabs">
    <button class="period-btn active" onclick="setPeriod('week',this)">Неделя</button>
    <button class="period-btn" onclick="setPeriod('month',this)">Месяц</button>
    <button class="period-btn" onclick="setPeriod('all',this)">Всё время</button>
  </div>

  <!-- КПИ -->
  <div class="kpi-grid" id="kpiGrid"></div>

  <!-- ГРАФИКИ -->
  <div class="charts-row">
    <div class="chart-card">
      <div class="chart-title">Активность платформы</div>
      <div class="chart-sub">Новые заказы и отклики по дням</div>
      <canvas id="activityChart" height="200"></canvas>
    </div>
    <div class="chart-card">
      <div class="chart-title">Заказы по категориям</div>
      <div class="chart-sub">Распределение</div>
      <canvas id="categoryChart" height="200"></canvas>
    </div>
  </div>

  <!-- ТАБЛИЦЫ -->
  <div class="tables-row">
    <div class="table-card">
      <div class="table-title">🏆 Топ работодатели</div>
      <table id="topEmployers">
        <tr><th>Компания</th><th>Заказов</th><th>Потрачено</th></tr>
      </table>
    </div>
    <div class="table-card">
      <div class="table-title">⭐ Топ исполнители</div>
      <table id="topWorkers">
        <tr><th>Исполнитель</th><th>Заказов</th><th>Рейтинг</th></tr>
      </table>
    </div>
  </div>

  <!-- ВОРОНКА -->
  <div class="funnel">
    <div class="funnel-title">🎯 Воронка конверсии</div>
    <div id="funnelData"></div>
  </div>

  <!-- ЖИВАЯ ЛЕНТА -->
  <div class="feed">
    <div class="feed-title">⚡ Последние события</div>
    <div id="feedData"></div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script>
var period = 'week';
var actChart, catChart;

function setPeriod(p, btn) {
  period = p;
  document.querySelectorAll('.period-btn').forEach(function(b){ b.classList.remove('active'); });
  btn.classList.add('active');
  render();
}

function getStats() {
  var jobs = Shabashka.getAllJobs ? Shabashka.getAllJobs() : Shabashka.getOpenJobs();
  var users = JSON.parse(localStorage.getItem('shabashka_user') ? '[' + localStorage.getItem('shabashka_user') + ']' : '[]');
  var feedbacks = JSON.parse(localStorage.getItem('shabashka_feedbacks') || '[]');
  var responses = [];
  jobs.forEach(function(j){ responses = responses.concat(Shabashka.getResponsesForJob(j.id)); });

  var done = jobs.filter(function(j){ return j.status === 'done'; });
  var revenue = done.reduce(function(s,j){ return s + Math.round(j.pay * 0.1); }, 0);

  return { jobs: jobs, responses: responses, done: done, revenue: revenue, feedbacks: feedbacks };
}

function renderKPI(stats) {
  var data = [
    { label: 'Всего заказов', val: stats.jobs.length, change: '+' + Math.floor(stats.jobs.length * 0.15) + ' за период', dir: 'up', color: '#E8510A' },
    { label: 'Откликов', val: stats.responses.length, change: '+' + Math.floor(stats.responses.length * 0.2) + ' за период', dir: 'up', color: '#185FA5' },
    { label: 'Завершено', val: stats.done.length, change: stats.done.length + ' из ' + stats.jobs.length, dir: 'neutral', color: '#1A7A4A' },
    { label: 'Доход платформы', val: stats.revenue.toLocaleString('ru') + ' ₽', change: '10% комиссия', dir: 'up', color: '#B07800' },
  ];
  document.getElementById('kpiGrid').innerHTML = data.map(function(d){
    return '<div class="kpi">' +
      '<div class="kpi-label">' + d.label + '</div>' +
      '<div class="kpi-val" style="color:' + d.color + '">' + d.val + '</div>' +
      '<div class="kpi-change ' + d.dir + '">' + (d.dir==='up'?'↑ ':'') + d.change + '</div>' +
    '</div>';
  }).join('');
}

function renderCharts(stats) {
  // График активности
  var days = ['Пн','Вт','Ср','Чт','Пт','Сб','Вс'];
  var jobsData = days.map(function(){ return Math.floor(Math.random()*5+1); });
  var respData = days.map(function(){ return Math.floor(Math.random()*15+3); });

  if (actChart) actChart.destroy();
  actChart = new Chart(document.getElementById('activityChart'), {
    type: 'bar',
    data: {
      labels: days,
      datasets: [
        { label: 'Заказы', data: jobsData, backgroundColor: '#E8510A', borderRadius: 6 },
        { label: 'Отклики', data: respData, backgroundColor: '#FDD5C0', borderRadius: 6 },
      ]
    },
    options: { responsive: true, plugins: { legend: { position: 'bottom' } }, scales: { y: { beginAtZero: true } } }
  });

  // Pie по категориям
  var cats = { 'Переезд': 0, 'Строительство': 0, 'Уборка': 0, 'Ивент': 0, 'Прочее': 0 };
  stats.jobs.forEach(function(j){
    if (j.cat === 'move') cats['Переезд']++;
    else if (j.cat === 'build') cats['Строительство']++;
    else if (j.cat === 'clean') cats['Уборка']++;
    else if (j.cat === 'event') cats['Ивент']++;
    else cats['Прочее']++;
  });

  if (catChart) catChart.destroy();
  catChart = new Chart(document.getElementById('categoryChart'), {
    type: 'doughnut',
    data: {
      labels: Object.keys(cats),
      datasets: [{ data: Object.values(cats), backgroundColor: ['#E8510A','#185FA5','#1A7A4A','#B07800','#9A9A96'] }]
    },
    options: { responsive: true, plugins: { legend: { position: 'bottom' } } }
  });
}

function renderTables(stats) {
  // Топ работодатели
  var employers = {};
  stats.jobs.forEach(function(j){
    if (!employers[j.company]) employers[j.company] = { count: 0, spend: 0 };
    employers[j.company].count++;
    employers[j.company].spend += j.pay;
  });
  var topEmp = Object.entries(employers).sort(function(a,b){ return b[1].count - a[1].count; }).slice(0,5);
  document.getElementById('topEmployers').innerHTML =
    '<tr><th>Компания</th><th>Заказов</th><th>Потрачено</th></tr>' +
    topEmp.map(function(e){
      return '<tr><td>' + e[0] + '</td><td>' + e[1].count + '</td><td>' + e[1].spend.toLocaleString('ru') + ' ₽</td></tr>';
    }).join('');

  // Топ исполнители (симулируем)
  var workers = [
    { name: 'Дмитрий К.', orders: 12, rating: '4.9' },
    { name: 'Андрей С.', orders: 8, rating: '4.8' },
    { name: 'Мария П.', orders: 6, rating: '5.0' },
    { name: 'Виктор Л.', orders: 5, rating: '4.7' },
    { name: 'Алексей М.', orders: 4, rating: '4.9' },
  ];
  document.getElementById('topWorkers').innerHTML =
    '<tr><th>Исполнитель</th><th>Заказов</th><th>Рейтинг</th></tr>' +
    workers.map(function(w){
      return '<tr><td>' + w.name + '</td><td>' + w.orders + '</td><td>⭐ ' + w.rating + '</td></tr>';
    }).join('');
}

function renderFunnel(stats) {
  var total = stats.jobs.length || 1;
  var steps = [
    { label: 'Просмотрели заказы', val: total * 8, pct: 100 },
    { label: 'Открыли детали', val: total * 4, pct: 50 },
    { label: 'Откликнулись', val: stats.responses.length, pct: Math.round(stats.responses.length / (total * 8) * 100) },
    { label: 'Выбраны работодателем', val: Math.round(stats.responses.length * 0.3), pct: Math.round(stats.responses.length * 0.3 / (total * 8) * 100) },
    { label: 'Заказ завершён', val: stats.done.length, pct: Math.round(stats.done.length / (total * 8) * 100) },
  ];
  document.getElementById('funnelData').innerHTML = steps.map(function(s){
    return '<div class="funnel-row">' +
      '<div class="funnel-label"><span>' + s.label + '</span><span style="font-weight:700">' + s.val + ' (' + s.pct + '%)</span></div>' +
      '<div class="funnel-bar"><div class="funnel-fill" style="width:' + s.pct + '%"></div></div>' +
    '</div>';
  }).join('');
}

function renderFeed() {
  var events = [
    { color: '#E8510A', text: 'Новый отклик на "Грузчики на переезд"', time: '2 мин назад' },
    { color: '#1A7A4A', text: 'Заказ "Уборка офиса" завершён', time: '15 мин назад' },
    { color: '#185FA5', text: 'Новый пользователь зарегистрировался', time: '32 мин назад' },
    { color: '#E8510A', text: 'Новый заказ "Подсобный рабочий на стройку"', time: '1 ч назад' },
    { color: '#B07800', text: 'Получена обратная связь от пользователя', time: '2 ч назад' },
    { color: '#1A7A4A', text: 'Верификация паспорта одобрена', time: '3 ч назад' },
  ];
  document.getElementById('feedData').innerHTML = events.map(function(e){
    return '<div class="feed-item">' +
      '<div class="feed-dot" style="background:' + e.color + '"></div>' +
      '<div class="feed-text">' + e.text + '</div>' +
      '<div class="feed-time">' + e.time + '</div>' +
    '</div>';
  }).join('');
}

function exportCSV() {
  var stats = getStats();
  var csv = 'Метрика,Значение\n';
  csv += 'Всего заказов,' + stats.jobs.length + '\n';
  csv += 'Завершено,' + stats.done.length + '\n';
  csv += 'Откликов,' + stats.responses.length + '\n';
  csv += 'Доход платформы,' + stats.revenue + ' руб\n';
  csv += 'Отзывов,' + stats.feedbacks.length + '\n';

  var blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8' });
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'shabashka-stats-' + new Date().toISOString().slice(0,10) + '.csv';
  a.click();
}

function render() {
  var stats = getStats();
  renderKPI(stats);
  renderCharts(stats);
  renderTables(stats);
  renderFunnel(stats);
  renderFeed();
}

render();
</script>
</body>
</html>
