<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Админка — Шабашка</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#14151A;color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center}
.box{background:#1E1E1C;border-radius:20px;padding:36px 32px;width:340px;text-align:center}
.logo{font-size:24px;font-weight:800;margin-bottom:4px}
.logo span{color:#E8510A}
.sub{font-size:13px;color:rgba(255,255,255,.4);margin-bottom:24px}
input{width:100%;padding:13px 16px;background:rgba(255,255,255,.07);border:1.5px solid rgba(255,255,255,.1);border-radius:12px;color:#fff;font-size:16px;font-family:inherit;outline:none;text-align:center;margin-bottom:12px}
button{width:100%;padding:14px;background:#E8510A;color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit}
.err{color:#FF6B6B;font-size:13px;margin-bottom:12px;display:none}
.links{margin-top:20px;display:flex;flex-direction:column;gap:8px}
.links a{display:block;padding:12px;background:rgba(255,255,255,.05);border-radius:10px;color:rgba(255,255,255,.7);text-decoration:none;font-size:13px}
.links a:hover{background:rgba(255,255,255,.1)}
</style>
</head>
<body>
<div class="box">
  <div class="logo">Шаба<span>шка</span></div>
  <div class="sub">Панель администратора</div>
  <input type="password" id="pass" placeholder="Пароль" onkeydown="if(event.key==='Enter')check()">
  <div class="err" id="err">Неверный пароль</div>
  <button onclick="check()">Войти</button>
  <div class="links" id="menu" style="display:none">
    <a href="/admin-stats">📊 Статистика</a>
    <a href="/admin-feedback">💬 Отзывы и вопросы</a>
    <a href="/admin-users">👥 Пользователи</a>
    <a href="/admin-orders">📋 Заказы</a>
    <a href="/admin-workers">⭐ Исполнители</a>
    <a href="/admin-reviews">🏆 Отзывы</a>
    <a href="/admin-complaints">⚠️ Жалобы</a>
    <a href="/admin-finance">💰 Финансы</a>
    <a href="/admin-settings">⚙️ Настройки</a>
  </div>
</div>
<script>
var PASS = 'shabashka_admin_2025';
function check() {
  var val = document.getElementById('pass').value;
  if (val === PASS) {
    sessionStorage.setItem('shabashka_admin_auth', '1');
    document.getElementById('pass').style.display = 'none';
    document.getElementById('err').style.display = 'none';
    document.querySelector('button').style.display = 'none';
    document.querySelector('.sub').textContent = 'Добро пожаловать!';
    document.getElementById('menu').style.display = 'flex';
  } else {
    document.getElementById('err').style.display = 'block';
    document.getElementById('pass').value = '';
  }
}
// Если уже авторизован
if (sessionStorage.getItem('shabashka_admin_auth') === '1') {
  document.querySelector('.sub').textContent = 'Добро пожаловать!';
  document.getElementById('pass').style.display = 'none';
  document.querySelector('button').style.display = 'none';
  document.getElementById('menu').style.display = 'flex';
}
</script>
</body>
</html>
