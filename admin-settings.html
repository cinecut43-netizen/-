<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Шабашка — Настройки</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --orange: #E8510A; --orange-light: #FFF0E8; --orange-dark: #B33D06;
  --dark: #14151A; --gray: #6B6B67; --gray-light: #F4F3EF; --border: #E5E4E0;
  --white: #FFFFFF; --green: #1A7A4A; --green-bg: #E8F5EE;
}
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; color: var(--dark); }

.panel { background: var(--white); border: 1px solid var(--border); border-radius: 12px; padding: 22px; margin-bottom: 18px; max-width: 640px; }
.panel-title { font-size: 14.5px; font-weight: 700; margin-bottom: 4px; }
.panel-sub { font-size: 12px; color: var(--gray); margin-bottom: 18px; }

.field-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--border); }
.field-row:last-child { border-bottom: none; }
.field-label { font-size: 13.5px; font-weight: 500; }
.field-hint { font-size: 11.5px; color: var(--gray); margin-top: 2px; }
.field-input { width: 110px; padding: 7px 10px; border: 1px solid var(--border); border-radius: 7px; font-size: 13px; font-family: inherit; text-align: right; }
.field-input:disabled { background: var(--gray-light); color: var(--gray); }

.toggle { width: 40px; height: 22px; border-radius: 12px; background: var(--border); position: relative; cursor: pointer; flex-shrink: 0; transition: background 0.15s; }
.toggle.on { background: var(--orange); }
.toggle-knob { width: 18px; height: 18px; border-radius: 50%; background: #fff; position: absolute; top: 2px; left: 2px; transition: left 0.15s; }
.toggle.on .toggle-knob { left: 20px; }
.toggle.disabled { opacity: 0.5; cursor: not-allowed; }

.save-bar { position: sticky; bottom: 0; background: var(--white); border-top: 1px solid var(--border); padding: 14px; max-width: 640px; display: flex; justify-content: flex-end; }
.btn-save { padding: 10px 20px; background: var(--orange); color: #fff; border: none; border-radius: 9px; font-size: 13.5px; font-weight: 600; cursor: pointer; font-family: inherit; }
.btn-save:disabled { background: var(--border); color: var(--gray); cursor: not-allowed; }
.saved-toast { font-size: 12px; color: var(--green); margin-right: auto; align-self: center; opacity: 0; transition: opacity 0.2s; }
.saved-toast.show { opacity: 1; }
</style>
<script src="/data.js"></script>
<script src="/admin-data.js"></script>
<script src="/admin-nav.js"></script>
</head>
<body>
<script>
const rendered = ShabashkaAdminNav.renderAdminShell('settings', 'Настройки');

if (rendered) {
  const A = ShabashkaAdmin;
  const canEdit = A.canDo('settings.edit');
  const s = A.getSettings();
  const dis = canEdit ? '' : 'disabled';

  document.getElementById('admContentRoot').innerHTML = `
    <div class="panel">
      <div class="panel-title">Комиссии и тарифы</div>
      <div class="panel-sub">Влияет на все новые расчёты в системе</div>
      <div class="field-row">
        <div><div class="field-label">Комиссия платформы</div><div class="field-hint">% от суммы заказа при завершении</div></div>
        <input class="field-input" type="number" id="commissionPercent" value="${s.commissionPercent}" ${dis}>
      </div>
      <div class="field-row">
        <div><div class="field-label">Комиссия экспресс-вывода</div><div class="field-hint">% при моментальном выводе средств</div></div>
        <input class="field-input" type="number" id="expressWithdrawFeePercent" value="${s.expressWithdrawFeePercent}" step="0.1" ${dis}>
      </div>
    </div>

    <div class="panel">
      <div class="panel-title">Подписки</div>
      <div class="panel-sub">Цены ежемесячных тарифов</div>
      <div class="field-row">
        <div><div class="field-label">Подписка для работодателя</div><div class="field-hint">Безлимит заказов + приоритет</div></div>
        <input class="field-input" type="number" id="employerSubscriptionPrice" value="${s.employerSubscriptionPrice}" ${dis}>
      </div>
      <div class="field-row">
        <div><div class="field-label">Подписка PRO для исполнителя</div><div class="field-hint">Больше откликов + приоритет в выдаче</div></div>
        <input class="field-input" type="number" id="workerProSubscriptionPrice" value="${s.workerProSubscriptionPrice}" ${dis}>
      </div>
    </div>

    <div class="panel">
      <div class="panel-title">Реферальная программа</div>
      <div class="field-row">
        <div><div class="field-label">Бонус за приглашённого друга</div><div class="field-hint">Начисляется после первого завершённого заказа</div></div>
        <input class="field-input" type="number" id="referralBonus" value="${s.referralBonus}" ${dis}>
      </div>
    </div>

    <div class="panel">
      <div class="panel-title">Уведомления</div>
      <div class="field-row">
        <div class="field-label">Новые заказы</div>
        <div class="toggle ${s.notifyNewOrders ? 'on' : ''} ${canEdit?'':'disabled'}" data-key="notifyNewOrders"><div class="toggle-knob"></div></div>
      </div>
      <div class="field-row">
        <div class="field-label">Новые жалобы</div>
        <div class="toggle ${s.notifyNewComplaints ? 'on' : ''} ${canEdit?'':'disabled'}" data-key="notifyNewComplaints"><div class="toggle-knob"></div></div>
      </div>
      <div class="field-row">
        <div class="field-label">Низкий баланс пользователя</div>
        <div class="toggle ${s.notifyLowBalance ? 'on' : ''} ${canEdit?'':'disabled'}" data-key="notifyLowBalance"><div class="toggle-knob"></div></div>
      </div>
    </div>

    <div class="save-bar">
      <span class="saved-toast" id="savedToast">Сохранено</span>
      <button class="btn-save" id="saveBtn" ${canEdit?'':'disabled'}>Сохранить изменения</button>
    </div>
  `;

  let toggleState = { notifyNewOrders: s.notifyNewOrders, notifyNewComplaints: s.notifyNewComplaints, notifyLowBalance: s.notifyLowBalance };

  document.querySelectorAll('.toggle').forEach(t => {
    t.addEventListener('click', () => {
      if (t.classList.contains('disabled')) return;
      t.classList.toggle('on');
      const key = t.getAttribute('data-key');
      toggleState[key] = t.classList.contains('on');
    });
  });

  document.getElementById('saveBtn').addEventListener('click', () => {
    if (!canEdit) return;
    A.updateSettings({
      commissionPercent: parseFloat(document.getElementById('commissionPercent').value) || 0,
      expressWithdrawFeePercent: parseFloat(document.getElementById('expressWithdrawFeePercent').value) || 0,
      employerSubscriptionPrice: parseInt(document.getElementById('employerSubscriptionPrice').value) || 0,
      workerProSubscriptionPrice: parseInt(document.getElementById('workerProSubscriptionPrice').value) || 0,
      referralBonus: parseInt(document.getElementById('referralBonus').value) || 0,
      notifyNewOrders: toggleState.notifyNewOrders,
      notifyNewComplaints: toggleState.notifyNewComplaints,
      notifyLowBalance: toggleState.notifyLowBalance,
    });
    const toast = document.getElementById('savedToast');
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2000);
  });
}
</script>
</body>
</html>
