<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Шабашка — Чат</title>
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/bold/style.css">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --orange: #E8510A; --orange-light: #FFF0E8; --orange-dark: #B33D06;
  --dark: #1A1A18; --gray: #6B6B67; --gray-light: #F4F3EF;
  --border: #E2E1DB; --white: #FFFFFF; --green: #1A7A4A; --green-bg: #E8F5EE;
  --radius: 10px; --blue: #185FA5; --blue-bg: #E6F1FB;
}
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--gray-light); color: var(--dark); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

/* NAV */
nav { background: var(--white); border-bottom: 1px solid var(--border); padding: 0 20px; display: flex; align-items: center; gap: 12px; height: 52px; flex-shrink: 0; }
.back-btn { background: none; border: none; font-size: 20px; cursor: pointer; color: var(--gray); padding: 4px; }
.nav-title { font-size: 15px; font-weight: 600; }
.nav-sub { font-size: 12px; color: var(--gray); }
.nav-status { margin-left: auto; display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--green); }
.status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); }

/* LAYOUT */
.layout { display: flex; flex: 1; overflow: hidden; }

/* SIDEBAR */
.sidebar { width: 260px; background: var(--white); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; }
.sidebar-header { padding: 14px 16px; border-bottom: 1px solid var(--border); }
.sidebar-title { font-size: 13px; font-weight: 600; color: var(--gray); text-transform: uppercase; letter-spacing: 0.4px; }
.convo-list { overflow-y: auto; flex: 1; }
.convo-item { padding: 12px 16px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.1s; display: flex; gap: 10px; align-items: flex-start; }
.convo-item:hover { background: var(--gray-light); }
.convo-item.active { background: var(--orange-light); border-left: 3px solid var(--orange); }
.convo-avatar { width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px; color: var(--white); flex-shrink: 0; }
.convo-info { flex: 1; min-width: 0; }
.convo-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.convo-preview { font-size: 12px; color: var(--gray); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }
.convo-meta { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
.convo-time { font-size: 11px; color: var(--gray); }
.unread-badge { background: var(--orange); color: var(--white); font-size: 10px; font-weight: 700; border-radius: 20px; padding: 1px 6px; }

/* CHAT AREA */
.chat-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

/* JOB BANNER */
.job-banner { background: var(--white); border-bottom: 1px solid var(--border); padding: 10px 20px; display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
.job-banner-icon { font-size: 22px; }
.job-banner-info { flex: 1; }
.job-banner-title { font-size: 14px; font-weight: 600; }
.job-banner-detail { font-size: 12px; color: var(--gray); }
.job-banner-pay { font-size: 15px; font-weight: 700; color: var(--orange); }
.status-badge { font-size: 11px; padding: 3px 10px; border-radius: 20px; font-weight: 500; }
.status-open { background: var(--green-bg); color: var(--green); }
.status-pending { background: #FFF0E8; color: var(--orange-dark); }

/* MESSAGES */
.messages { flex: 1; overflow-y: auto; padding: 16px 20px; display: flex; flex-direction: column; gap: 12px; }

.msg-group { display: flex; flex-direction: column; gap: 4px; }
.msg-row { display: flex; gap: 8px; align-items: flex-end; }
.msg-row.me { flex-direction: row-reverse; }

.msg-avatar { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: var(--white); flex-shrink: 0; }

.bubble { max-width: 70%; padding: 10px 14px; border-radius: 14px; font-size: 14px; line-height: 1.5; position: relative; }
.bubble.them { background: var(--white); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
.bubble.me { background: var(--orange); color: var(--white); border-bottom-right-radius: 4px; }
.bubble.ai { background: var(--blue-bg); border: 1px solid #C5DCF5; border-bottom-left-radius: 4px; color: var(--dark); }

.msg-time { font-size: 11px; color: var(--gray); margin: 0 4px; }
.msg-row.me .msg-time { text-align: right; }

.sender-name { font-size: 11px; color: var(--gray); margin-bottom: 2px; padding-left: 36px; }
.sender-name.me-name { text-align: right; padding-left: 0; padding-right: 36px; }

.ai-label { display: flex; align-items: center; gap: 4px; font-size: 11px; color: var(--blue); font-weight: 600; margin-bottom: 4px; }

/* SYSTEM MESSAGE */
.sys-msg { text-align: center; font-size: 12px; color: var(--gray); padding: 4px 12px; background: var(--gray-light); border-radius: 20px; align-self: center; }

/* QUICK REPLIES */
.quick-replies { padding: 8px 20px; display: flex; gap: 8px; overflow-x: auto; flex-shrink: 0; }
.quick-replies::-webkit-scrollbar { display: none; }
.quick-btn { white-space: nowrap; padding: 6px 14px; border: 1px solid var(--border); border-radius: 20px; font-size: 13px; background: var(--white); cursor: pointer; color: var(--dark); transition: all 0.1s; }
.quick-btn:hover { border-color: var(--orange); color: var(--orange); }

/* INPUT */
.input-area { padding: 12px 16px; background: var(--white); border-top: 1px solid var(--border); display: flex; gap: 10px; align-items: flex-end; flex-shrink: 0; }
.chat-input { flex: 1; padding: 10px 14px; border: 1px solid var(--border); border-radius: 20px; font-size: 14px; font-family: inherit; resize: none; outline: none; max-height: 120px; overflow-y: auto; line-height: 1.4; transition: border 0.15s; }
.chat-input:focus { border-color: var(--orange); }
.send-btn { width: 40px; height: 40px; border-radius: 50%; background: var(--orange); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: background 0.15s; }
.send-btn:hover { background: var(--orange-dark); }
.send-btn svg { width: 18px; height: 18px; fill: white; }
.ai-btn { width: 40px; height: 40px; border-radius: 50%; background: var(--blue-bg); border: 1px solid #C5DCF5; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 18px; transition: background 0.15s; }
.ai-btn:hover { background: #D0E8F7; }

/* TYPING */
.typing-indicator { display: flex; align-items: center; gap: 4px; padding: 10px 14px; background: var(--white); border: 1px solid var(--border); border-radius: 14px; border-bottom-left-radius: 4px; width: fit-content; }
.typing-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--gray); animation: bounce 1.2s infinite; }
.typing-dot:nth-child(2) { animation-delay: 0.2s; }
.typing-dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-5px); } }

/* CONFIRM PANEL */
.confirm-panel { margin: 0 20px 12px; background: var(--green-bg); border: 1px solid #A8DDB8; border-radius: var(--radius); padding: 14px; display: flex; align-items: center; gap: 12px; }
.confirm-text { flex: 1; font-size: 13px; color: var(--green); }
.confirm-text strong { display: block; font-size: 14px; margin-bottom: 2px; color: #0F5030; }
.confirm-btns { display: flex; gap: 8px; }
.btn-accept { background: var(--green); color: var(--white); border: none; border-radius: 8px; padding: 7px 14px; font-size: 13px; font-weight: 600; cursor: pointer; }
.btn-decline { background: none; border: 1px solid #A8DDB8; border-radius: 8px; padding: 7px 14px; font-size: 13px; color: var(--green); cursor: pointer; }

@media (max-width: 600px) {
  .sidebar { display: none; }
  body { padding-bottom: 70px; }
  nav { padding: 0 12px; height: 50px; }
  .chat-layout { height: calc(100vh - 50px - 60px); }
  .chat-header { padding: 10px 14px; }
  .chat-messages { padding: 12px; }
  .bubble { max-width: 85%; font-size: 14px; padding: 8px 12px; }
  .chat-input-bar { padding: 8px 12px; gap: 8px; }
  .chat-input { font-size: 15px; }
  .send-btn { width: 40px; height: 40px; font-size: 18px; }
  .ai-btn { padding: 8px 12px; font-size: 12px; }
}
.mobile-bottom-nav { position:fixed;bottom:0;left:0;right:0;height:60px;background:#fff;border-top:1px solid #E5E4E0;display:none;align-items:center;justify-content:space-around;z-index:200; }
.mobile-nav-btn { display:flex;flex-direction:column;align-items:center;gap:3px;border:none;background:none;cursor:pointer;padding:8px 12px;color:#6B6B67;font-family:inherit; }
.mobile-nav-btn.active { color:#E8510A; }
</style>
<script src="/data.js"></script>
<script src="/nav.js"></script>
<script src="/icons.js"></script>
</head>
<body>

<div id="shabashka-nav"></div>
<nav>
  <button class="back-btn" onclick="history.back()">←</button>
  <div>
    <a href="/profile" style="text-decoration:none;color:inherit" id="navName" class="nav-title">Андрей К.</a>
    <div class="nav-sub" id="navJob">Сборка мебели IKEA</div>
  </div>
  <div class="nav-status"><div class="status-dot"></div> онлайн</div>
</nav>

<div class="layout">
  <div class="sidebar">
    <div class="sidebar-header"><div class="sidebar-title">Сообщения</div></div>
    <div class="convo-list" id="convoList"></div>
  </div>

  <div class="chat-area">
    <div class="job-banner">
      <div class="job-banner-icon" id="bannerIcon">🔨</div>
      <div class="job-banner-info">
        <div class="job-banner-title" id="bannerTitle">Сборка мебели IKEA</div>
        <div class="job-banner-detail" id="bannerDetail">📅 Завтра · 📍 м. Юго-Западная</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">
        <div class="job-banner-pay" id="bannerPay">2 000 ₽</div>
        <span class="status-badge status-open">Открыт</span>
      </div>
    </div>

    <div class="messages" id="messages"></div>

    <div class="confirm-panel" id="confirmPanel" style="display:none">
      <div class="confirm-text">
        <strong>✅ Исполнитель готов взяться за заказ</strong>
        Дмитрий П. хочет подтвердить участие. Комиссия платформы (10%) спишется после подтверждения.
      </div>
      <div class="confirm-btns">
        <button class="btn-accept" onclick="acceptWorker()">Принять</button>
        <button class="btn-decline" onclick="document.getElementById('confirmPanel').style.display='none'">Отклонить</button>
      </div>
    </div>

    <div class="quick-replies" id="quickReplies"></div>

    <div class="input-area">
      <button class="ai-btn" title="Спросить AI-ассистента" onclick="askAI()">🤖</button>
      <textarea class="chat-input" id="chatInput" placeholder="Написать сообщение..." rows="1"
        oninput="autoResize(this)" onkeydown="handleKey(event)"></textarea>
      <button class="send-btn" onclick="sendMsg()">
        <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
      </button>
    </div>
  </div>
</div>

<script>
Shabashka.renderNav('chat');

const CONVOS = [
  { id:1, name:'Андрей К.', job:'Сборка мебели IKEA', icon:'🔨', pay:'2 000 ₽', date:'Завтра · м. Юго-Западная', color:'#185FA5', unread:0, time:'10:32', preview:'Хорошо, буду вовремя!', jobId:5 },
  { id:2, name:'ООО ТрансЛогист', job:'Разгрузка фуры на складе', icon:'📦', pay:'3 200 ₽', date:'Завтра 6:00 · Солнцево', color:'#E8510A', unread:2, time:'09:15', preview:'Нужно ещё 2 человека...', jobId:9 },
  { id:3, name:'Агентство «Праздник»', job:'Официант на свадьбу', icon:'🎉', pay:'4 500 ₽', date:'Пятница · Ресторан Панорама', color:'#9B59B6', unread:1, time:'Вчера', preview:'Форму привезут за час...', jobId:7 },
  { id:4, name:'Семья Петровых', job:'Грузчики на переезд', icon:'📦', pay:'3 500 ₽', date:'Сегодня 9:00 · м. Щёлковская', color:'#1A7A4A', unread:0, time:'Вчера', preview:'Спасибо за работу! 👍', jobId:1 },
];

const MESSAGES_DB = {
  1: [
    { type:'sys', text:'Вы откликнулись на заказ «Сборка мебели IKEA»' },
    { type:'them', text:'Здравствуйте! Видел ваш отклик. Опыт сборки ИКЕА есть?', time:'10:05' },
    { type:'me', text:'Добрый день! Да, собирал неоднократно — кухни, шкафы, кровати. Дрель своя есть.', time:'10:08' },
    { type:'them', text:'Отлично. Шкаф-купе PAX и кухня METOD. Справитесь за день?', time:'10:12' },
    { type:'me', text:'Должен справиться, PAX собирал раза 3. Уточните — сколько секций шкафа?', time:'10:15' },
    { type:'them', text:'3 секции, высота 236. Кухня небольшая, 10 модулей.', time:'10:20' },
    { type:'ai', text:'💡 Подсказка: на PAX из 3 секций обычно уходит 2–3 часа, на кухню из 10 модулей — 3–4 часа. Итого ~7 часов. Рекомендую уточнить время начала, чтобы успеть засветло.', time:'10:21', isAI:true },
    { type:'me', text:'Хорошо, буду вовремя!', time:'10:32' },
  ],
  2: [
    { type:'sys', text:'Вы откликнулись на заказ «Разгрузка фуры на складе»' },
    { type:'them', text:'Привет! Нужно ещё 2 человека, можете кого-то привести?', time:'09:10' },
    { type:'them', text:'Доплатим по 500 ₽ за каждого приведённого.', time:'09:15' },
  ],
  3: [
    { type:'sys', text:'Вы откликнулись на заказ «Официант на свадьбу»' },
    { type:'them', text:'Форму привезут за час до начала, вас устроит?', time:'Вчера' },
  ],
  4: [
    { type:'sys', text:'Заказ «Грузчики на переезд» завершён' },
    { type:'them', text:'Ребята, огромное спасибо за работу! Всё аккуратно, быстро. 👍', time:'Вчера' },
    { type:'me', text:'Спасибо за отзыв, рады помочь!', time:'Вчера' },
  ],
};

const QUICK = {
  1: ['Во сколько начинаем?', 'Есть парковка?', 'Оплата наличными или картой?'],
  2: ['Есть напарник', 'Нет, только один', 'Во сколько подъезжать?'],
  3: ['Да, устроит', 'Можно чуть раньше?', 'Какой дресс-код?'],
  4: [],
};

let currentConvo = 1;
let typingTimeout = null;

function renderSidebar() {
  document.getElementById('convoList').innerHTML = CONVOS.map(c => `
    <div class="convo-item ${c.id === currentConvo ? 'active' : ''}" onclick="switchConvo(${c.id})">
      <div class="convo-avatar" style="background:${c.color}">${c.name[0]}</div>
      <div class="convo-info">
        <div class="convo-name">${c.name}</div>
        <div class="convo-preview">${c.preview}</div>
      </div>
      <div class="convo-meta">
        <span class="convo-time">${c.time}</span>
        ${c.unread ? `<span class="unread-badge">${c.unread}</span>` : ''}
      </div>
    </div>
  `).join('');
}

function switchConvo(id) {
  currentConvo = id;
  const c = CONVOS.find(x => x.id === id);
  document.getElementById('navName').textContent = c.name;
  document.getElementById('navJob').textContent = c.job;
  document.getElementById('bannerIcon').textContent = c.icon;
  document.getElementById('bannerTitle').textContent = c.job;
  document.getElementById('bannerDetail').textContent = '📅 ' + c.date;
  document.getElementById('bannerPay').textContent = c.pay;
  c.unread = 0;
  renderSidebar();
  renderMessages();
  renderQuickReplies();
  document.getElementById('confirmPanel').style.display = 'none';
}

function renderMessages() {
  const msgs = MESSAGES_DB[currentConvo] || [];
  const c = CONVOS.find(x => x.id === currentConvo);
  const el = document.getElementById('messages');
  el.innerHTML = msgs.map(m => {
    if (m.type === 'sys') return `<div class="sys-msg">${m.text}</div>`;
    if (m.type === 'ai') return `
      <div class="msg-group">
        <div class="ai-label">🤖 AI-ассистент Шабашки</div>
        <div class="msg-row">
          <div class="bubble ai">${m.text}</div>
          <span class="msg-time">${m.time}</span>
        </div>
      </div>`;
    const isMe = m.type === 'me';
    return `
      <div class="msg-group">
        <div class="${isMe ? 'sender-name me-name' : 'sender-name'}">${isMe ? 'Вы' : c.name}</div>
        <div class="msg-row ${isMe ? 'me' : ''}">
          ${!isMe ? `<div class="msg-avatar" style="background:${c.color}">${c.name[0]}</div>` : ''}
          <div class="bubble ${isMe ? 'me' : 'them'}">${m.text}</div>
          <span class="msg-time">${m.time}</span>
          ${isMe ? `<div class="msg-avatar" style="background:#888">Я</div>` : ''}
        </div>
      </div>`;
  }).join('');
  el.scrollTop = el.scrollHeight;
}

function renderQuickReplies() {
  const qs = QUICK[currentConvo] || [];
  document.getElementById('quickReplies').innerHTML = qs.map(q =>
    `<button class="quick-btn" onclick="sendQuick('${q}')">${q}</button>`
  ).join('');
}

function sendQuick(text) {
  document.getElementById('chatInput').value = text;
  sendMsg();
}

function sendMsg() {
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if (!text) return;
  const now = new Date();
  const time = now.getHours() + ':' + String(now.getMinutes()).padStart(2,'0');
  MESSAGES_DB[currentConvo] = MESSAGES_DB[currentConvo] || [];
  MESSAGES_DB[currentConvo].push({ type:'me', text, time });
  const c = CONVOS.find(x => x.id === currentConvo);
  c.preview = text;
  c.time = time;
  input.value = '';
  input.style.height = 'auto';
  renderMessages();
  renderSidebar();

  // simulate reply
  if (currentConvo === 1) {
    setTimeout(() => showTyping(), 1000);
    setTimeout(() => {
      hideTyping();
      const replies = [
        'Хорошо, понял вас!',
        'Договорились, до завтра 👍',
        'Ок, буду в 9 утра.',
        'Отлично, тогда до встречи!'
      ];
      const reply = replies[Math.floor(Math.random() * replies.length)];
      MESSAGES_DB[1].push({ type:'them', text: reply, time });
      c.preview = reply;
      renderMessages();
      renderSidebar();

      // after a bit, show confirm panel
      if (MESSAGES_DB[1].length > 9) {
        setTimeout(() => {
          document.getElementById('confirmPanel').style.display = 'flex';
        }, 800);
      }
    }, 2500);
  }
}

function showTyping() {
  const el = document.getElementById('messages');
  const div = document.createElement('div');
  div.id = 'typingIndicator';
  div.className = 'msg-group';
  const c = CONVOS.find(x => x.id === currentConvo);
  div.innerHTML = `
    <div class="msg-row">
      <div class="msg-avatar" style="background:${c.color}">${c.name[0]}</div>
      <div class="typing-indicator">
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
      </div>
    </div>`;
  el.appendChild(div);
  el.scrollTop = el.scrollHeight;
}

function hideTyping() {
  const t = document.getElementById('typingIndicator');
  if (t) t.remove();
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }
}

async function askAI() {
  const input = document.getElementById('chatInput');
  const userText = input.value.trim();
  const c = CONVOS.find(x => x.id === currentConvo);
  const msgs = MESSAGES_DB[currentConvo] || [];
  const history = msgs.filter(m => m.type !== 'sys' && !m.isAI)
    .map(m => `${m.type === 'me' ? 'Исполнитель' : 'Заказчик'}: ${m.text}`).join('\n');

  const question = userText || 'Что мне стоит уточнить у заказчика?';
  input.value = '';

  showTyping();

  const systemPrompt = `Ты AI-ассистент платформы "Шабашка" — маркетплейса разовых подработок. 
Помогаешь исполнителям и заказчикам общаться эффективно. 
Заказ: "${c.job}", оплата: ${c.pay}, дата: ${c.date}.
Переписка:\n${history}
Отвечай кратко, по-русски, практично. Не более 2-3 предложений.`;

  try {
    const res = await fetch('/api/ai-chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ question, systemPrompt })
    });
    const data = await res.json();
    hideTyping();

    if (!res.ok) {
      // Сервер вернул понятную ошибку (например, ключ не настроен)
      MESSAGES_DB[currentConvo].push({ type:'ai', text: '⚠️ ' + (data.error || 'AI-помощник временно недоступен.'), time: nowTime(), isAI: true });
      renderMessages();
      return;
    }

    const text = data.text || 'Не удалось получить ответ.';
    MESSAGES_DB[currentConvo].push({ type:'ai', text: '💡 ' + text, time: nowTime(), isAI: true });
    renderMessages();
  } catch(e) {
    hideTyping();
    MESSAGES_DB[currentConvo].push({ type:'ai', text: '⚠️ Не удалось связаться с AI-помощником. Проверьте подключение.', time: nowTime(), isAI: true });
    renderMessages();
  }
}

function nowTime() {
  const now = new Date();
  return now.getHours() + ':' + String(now.getMinutes()).padStart(2,'0');
}

function acceptWorker() {
  document.getElementById('confirmPanel').style.display = 'none';
  const now = new Date();
  const time = now.getHours() + ':' + String(now.getMinutes()).padStart(2,'0');
  MESSAGES_DB[currentConvo].push({ type:'sys', text:'✅ Заказ подтверждён! Комиссия 10% списана. Удачной работы!' });
  renderMessages();
}

// init
renderSidebar();

(function initFromQuery() {
  const jobId = Shabashka.jobIdFromQuery();
  if (jobId) {
    const existing = CONVOS.find(c => c.jobId === Number(jobId));
    if (existing) {
      currentConvo = existing.id;
    } else {
      const job = Shabashka.getJob(jobId);
      if (job) {
        const newConvo = {
          id: CONVOS.length + 1,
          name: job.company,
          job: job.title,
          icon: job.emoji,
          pay: Shabashka.rub(job.pay),
          date: job.date + ' · ' + job.location,
          color: job.colors[0],
          unread: 0,
          time: 'сейчас',
          preview: 'Чат начат',
          jobId: job.id,
        };
        CONVOS.unshift(newConvo);
        MESSAGES_DB[newConvo.id] = [
          { type: 'sys', text: 'Вы откликнулись на заказ «' + job.title + '»' },
        ];
        QUICK[newConvo.id] = ['Во сколько начинать?', 'Адрес уточните?', 'Какая оплата точно?'];
        currentConvo = newConvo.id;
        renderSidebar();
      }
    }
  }
  switchConvo(currentConvo);
})();

renderQuickReplies();
</script>
