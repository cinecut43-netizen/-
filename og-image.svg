<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F1014"/>
      <stop offset="100%" stop-color="#1A1B20"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8510A" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#E8510A" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Фон -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Световое пятно -->
  <ellipse cx="600" cy="200" rx="500" ry="300" fill="url(#glow)"/>

  <!-- Декоративные круги -->
  <circle cx="100" cy="100" r="80" fill="none" stroke="#E8510A" stroke-opacity="0.08" stroke-width="1"/>
  <circle cx="1100" cy="530" r="120" fill="none" stroke="#E8510A" stroke-opacity="0.08" stroke-width="1"/>
  <circle cx="1050" cy="100" r="50" fill="none" stroke="#E8510A" stroke-opacity="0.12" stroke-width="1"/>

  <!-- Логотип -->
  <text x="96" y="100" font-family="-apple-system, BlinkMacSystemFont, Arial, sans-serif" font-size="36" font-weight="900" fill="white" letter-spacing="-0.5">Шаба</text>
  <text x="236" y="100" font-family="-apple-system, BlinkMacSystemFont, Arial, sans-serif" font-size="36" font-weight="900" fill="#E8510A" letter-spacing="-0.5">шка</text>

  <!-- Разделитель -->
  <rect x="96" y="124" width="60" height="3" rx="1.5" fill="#E8510A"/>

  <!-- Заголовок -->
  <text x="96" y="230" font-family="-apple-system, BlinkMacSystemFont, Arial, sans-serif" font-size="72" font-weight="900" fill="white" letter-spacing="-2">Подработка</text>
  <text x="96" y="320" font-family="-apple-system, BlinkMacSystemFont, Arial, sans-serif" font-size="72" font-weight="900" fill="white" letter-spacing="-2">без лишних</text>
  <text x="96" y="410" font-family="-apple-system, BlinkMacSystemFont, Arial, sans-serif" font-size="72" font-weight="900" fill="#E8510A" letter-spacing="-2">слов</text>

  <!-- Описание -->
  <text x="96" y="480" font-family="-apple-system, BlinkMacSystemFont, Arial, sans-serif" font-size="24" fill="white" fill-opacity="0.5">Грузчики · Уборка · Стройка · Ивент</text>

  <!-- Правая панель — цифры -->
  <rect x="780" y="180" width="324" height="280" rx="20" fill="white" fill-opacity="0.04" stroke="white" stroke-opacity="0.08" stroke-width="1"/>

  <text x="942" y="250" font-family="-apple-system, BlinkMacSystemFont, Arial, sans-serif" font-size="48" font-weight="900" fill="white" text-anchor="middle">2 400+</text>
  <text x="942" y="282" font-family="-apple-system, BlinkMacSystemFont, Arial, sans-serif" font-size="16" fill="white" fill-opacity="0.4" text-anchor="middle">исполнителей</text>

  <line x1="820" y1="306" x2="1064" y2="306" stroke="white" stroke-opacity="0.08" stroke-width="1"/>

  <text x="942" y="360" font-family="-apple-system, BlinkMacSystemFont, Arial, sans-serif" font-size="48" font-weight="900" fill="#E8510A" text-anchor="middle">14 800+</text>
  <text x="942" y="392" font-family="-apple-system, BlinkMacSystemFont, Arial, sans-serif" font-size="16" fill="white" fill-opacity="0.4" text-anchor="middle">заказов выполнено</text>

  <line x1="820" y1="416" x2="1064" y2="416" stroke="white" stroke-opacity="0.08" stroke-width="1"/>

  <text x="942" y="440" font-family="-apple-system, BlinkMacSystemFont, Arial, sans-serif" font-size="24" font-weight="700" fill="white" text-anchor="middle">⭐ 4.9 · Москва</text>

  <!-- URL внизу -->
  <text x="96" y="580" font-family="-apple-system, BlinkMacSystemFont, Arial, sans-serif" font-size="18" fill="white" fill-opacity="0.3">shabashka-jade.vercel.app</text>
</svg>
